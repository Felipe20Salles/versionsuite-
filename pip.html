<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Em Foco</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#16162a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;user-select:none;overflow:hidden}
.bar{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
.bar-title{font-size:9px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px}
.bar-btns{display:flex;gap:4px}
.hbtn{background:none;border:1px solid rgba(255,255,255,.1);border-radius:4px;color:rgba(255,255,255,.35);font-size:10px;padding:2px 7px;cursor:pointer;font-family:inherit}
.hbtn:hover{background:rgba(255,255,255,.07);color:#fff}
.body{padding:12px 12px 8px}
.os-name{font-size:11px;font-weight:500;color:#e2e8f0;line-height:1.4;min-height:28px;margin-bottom:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.timer{font-size:26px;font-weight:700;font-family:monospace;color:#10b981;letter-spacing:-1px;margin-bottom:2px}
.timer.paused{color:#f59e0b}
.timer.idle{color:rgba(255,255,255,.25);font-size:13px;font-weight:400;letter-spacing:0}
.sub{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:10px}
.acts{display:flex;flex-direction:column;gap:4px}
.btn{width:100%;padding:6px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:none;color:rgba(255,255,255,.45);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:6px}
.btn:hover{background:rgba(255,255,255,.06)}
.btn.g{color:#10b981;border-color:rgba(16,185,129,.3)}
.btn.p{background:#7c6ff7;color:#fff;border-color:transparent}
.btn.p:hover{opacity:.88}
.footer{padding:7px 12px;border-top:1px solid rgba(255,255,255,.05);font-size:10px;color:rgba(255,255,255,.2);cursor:pointer}
.footer:hover{color:rgba(255,255,255,.45)}
</style>
</head>
<body>
<div class="bar">
  <span class="bar-title">&#x2B21; Em Foco</span>
  <div class="bar-btns">
    <button class="hbtn" id="btn-min">&#8592; Min</button>
    <button class="hbtn" id="btn-close">&#215;</button>
  </div>
</div>
<div class="body">
  <div class="os-name" id="t">Nenhuma OS em foco</div>
  <div class="timer idle" id="tm">&#8212;</div>
  <div class="sub" id="sb"></div>
  <div class="acts" id="ac"></div>
</div>
<div class="footer" id="btn-kanban">Version Suite &middot; Kanban</div>
<script>
var _iv = null;

function fmt(s) {
  var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? (h + 'h' + String(m).padStart(2, '0') + 'm') : (m + 'm');
}

function getSt() {
  try { return window.opener && window.opener.getFocusState ? window.opener.getFocusState() : null; } catch(e) { return null; }
}

function getOss() {
  try { return window.opener && window.opener.S ? window.opener.S.oss : []; } catch(e) { return []; }
}

function getAcc(st) {
  try { return window.opener.focusAccumulatedToday(st.osId); } catch(e) { return 0; }
}

function op(fn, arg) {
  try { if (window.opener && window.opener[fn]) window.opener[fn](arg); setTimeout(_update, 400); } catch(e) {}
}

document.getElementById('btn-min').addEventListener('click', function() {
  try { if (window.opener) window.opener._pipMinimize(); } catch(e) {}
  window.close();
});

document.getElementById('btn-close').addEventListener('click', function() {
  try { if (window.opener) window.opener._pipClose(); } catch(e) {}
  window.close();
});

document.getElementById('btn-kanban').addEventListener('click', function() {
  op('goScreen', 'kanban');
  try { window.opener.focus(); } catch(e) {}
});

function _update() {
  var s = getSt();
  var tEl = document.getElementById('t');
  var tmEl = document.getElementById('tm');
  var sbEl = document.getElementById('sb');
  var acEl = document.getElementById('ac');

  if (!s) {
    tEl.textContent = 'Nenhuma OS em foco';
    tmEl.className = 'timer idle';
    tmEl.innerHTML = '&mdash;';
    sbEl.textContent = '';
    acEl.innerHTML = '';
    var kb = document.createElement('button');
    kb.className = 'btn p';
    kb.textContent = 'Ir ao Kanban';
    kb.addEventListener('click', function() { op('goScreen', 'kanban'); });
    acEl.appendChild(kb);
    return;
  }

  var os = getOss().find(function(o) { return o.id === s.osId; });
  tEl.textContent = os ? ('#' + os.num + ' · ' + os.titulo) : 'OS desconhecida';

  var a = getAcc(s);
  if (s.startedAt && !s.pausedAt) a += Math.floor((Date.now() - s.startedAt) / 1000);
  tmEl.className = 'timer' + (s.pausedAt ? ' paused' : '');
  tmEl.textContent = fmt(a);
  sbEl.textContent = s.pausedAt ? 'pausado' : 'nesta sessão';

  acEl.innerHTML = '';
  var b1 = document.createElement('button');
  b1.className = 'btn' + (s.pausedAt ? ' g' : '');
  b1.textContent = s.pausedAt ? '▶ Retomar' : '⏸ Pausar';
  b1.addEventListener('click', function() { op(s.pausedAt ? 'resumeFocus' : 'pauseFocus'); });

  var b2 = document.createElement('button');
  b2.className = 'btn g';
  b2.textContent = '✓ Concluir OS';
  var oid = s.osId;
  b2.addEventListener('click', function() { op('concludeOS', oid); });

  var b3 = document.createElement('button');
  b3.className = 'btn';
  b3.textContent = '↻ Trocar OS';
  b3.addEventListener('click', function() { op('trocarFoco'); });

  acEl.appendChild(b1);
  acEl.appendChild(b2);
  acEl.appendChild(b3);
}

window._update = _update;
clearInterval(_iv);
_iv = setInterval(_update, 1000);
_update();
</script>
</body>
</html>
